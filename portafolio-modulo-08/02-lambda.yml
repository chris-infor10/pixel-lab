AWSTemplateFormatVersion: '2010-09-09'
Description: Serverless Inteligente - Funciones Lambda Usuarios y Pedidos

Resources:

# ----------------------------
# 👤 LAMBDA USUARIOS
# ----------------------------

  LambdaUsuarios:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: UsuariosFunction
      Runtime: python3.9
      Handler: index.handler
      Role: arn:aws:iam::866240658957:role/LabRole
      Code:
        ZipFile: |
          def handler(event, context):
              return {
                  'statusCode': 200,
                  'body': 'Microservicio Usuarios funcionando'
              }

# ----------------------------
# 🛒 LAMBDA PEDIDOS
# ----------------------------

  LambdaPedidos:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: PedidosFunction
      Runtime: python3.9
      Handler: index.handler
      Role: arn:aws:iam::866240658957:role/LabRole
      Code:
        ZipFile: |
          import json
          import boto3
          import uuid

          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table('Pedidos')

          def handler(event, context):
              order_id = str(uuid.uuid4())

              table.put_item(
                  Item={
                      'orderId': order_id,
                      'detalle': 'Pedido creado desde Lambda'
                  }
              )

              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'mensaje': 'Pedido creado',
                      'orderId': order_id
                  })
              }

Outputs:

  LambdaUsuariosArn:
    Description: ARN de la función Lambda Usuarios
    Value: !GetAtt LambdaUsuarios.Arn

  LambdaPedidosArn:
    Description: ARN de la función Lambda Pedidos
    Value: !GetAtt LambdaPedidos.Arn
