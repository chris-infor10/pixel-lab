AWSTemplateFormatVersion: '2010-09-09'
Description: Cloud Secure - CloudTrail con bucket S3 cifrado para auditoria de eventos

Resources:

# ----------------------------
# 🪣 BUCKET PARA LOGS DE CLOUDTRAIL
# ----------------------------

  TrailBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "cloudtrail-logs-${AWS::AccountId}-${AWS::Region}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

# ----------------------------
# 📜 BUCKET POLICY (Permite escritura a CloudTrail)
# ----------------------------

  TrailBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref TrailBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AWSCloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !Sub "${TrailBucket.Arn}"
          - Sid: AWSCloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub "${TrailBucket.Arn}/AWSLogs/${AWS::AccountId}/*"
            Condition:
              StringEquals:
                "s3:x-amz-acl": "bucket-owner-full-control"

# ----------------------------
# 🔍 CLOUDTRAIL TRAIL
# ----------------------------

  CloudTrail:
    Type: AWS::CloudTrail::Trail
    DependsOn: TrailBucketPolicy
    Properties:
      TrailName: !Sub "CloudTrail-${AWS::Region}"
      S3BucketName: !Ref TrailBucket
      IsLogging: true
      IncludeGlobalServiceEvents: true
      IsMultiRegionTrail: true

Outputs:

  TrailName:
    Description: Nombre del Trail de CloudTrail
    Value: !Ref CloudTrail

  TrailBucketName:
    Description: Bucket S3 donde se almacenan los logs de CloudTrail
    Value: !Ref TrailBucket
