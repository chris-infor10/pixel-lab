AWSTemplateFormatVersion: '2010-09-09'
Description: Cloud Secure - Alarma CloudWatch para monitoreo de CPU en EC2 (umbral 70%)

Resources:

# ----------------------------
# 📊 CLOUDWATCH ALARM (CPU > 70%)
# ----------------------------

  CPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: CPUAlarm
      AlarmDescription: Alarma de seguridad - uso de CPU supera el 70% en instancias EC2
      Namespace: AWS/EC2
      MetricName: CPUUtilization
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 70
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:

  AlarmName:
    Description: Nombre de la alarma CloudWatch
    Value: !Ref CPUAlarm

  AlarmDescription:
    Description: Descripcion de la alarma configurada
    Value: "Alarma activada cuando CPUUtilization de EC2 supera el 70% durante 5 minutos"
